name: CI

on:
  push:
    branches: ["main", "feat/**", "fix/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        env:
          # Tests use in-memory SQLite — no real DB needed
          DATABASE_URL: "sqlite+aiosqlite:///./test_advuman.db"
          ANTHROPIC_API_KEY: "sk-ant-test-key"
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff (lint)
        run: ruff check src/ scripts/ tests/ --output-format=github

      - name: Run ruff (format check)
        run: ruff format src/ scripts/ tests/ --check
